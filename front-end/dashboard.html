<!DOCTYPE html>
<html lang="en">
<head>
    <title>NOTAKI</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Inter:400,500&display=swap">
    <script defer src="js/dashboard.js"></script>
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<header>
    <div style="display:flex; align-items:center; justify-content:space-between;">
        <div>
            <h1><span class="accent-dot"></span>NOTAKI</h1>
            <p class="subtitle">FastAPI · SQLModel</p>
        </div>
        <button class="btn-logout" id="btn-logout">Logout</button>
    </div>
</header>

<div class="layout">

    <!-- LEFT: Create Note -->
    <div class="panel-create">
        <div class="panel-create-inner">
            <p class="panel-label">New Note</p>

            <textarea id="note-input" class="note-input1" placeholder="Write your note here..."></textarea>
            <div class="word-count"> 
                <span id="counter">0</span>/100 Words
            </div>

            <div class="btn-submit">
                <button id="save-btn" type="button">Save Note</button>
            </div>
        </div>
    </div>

    <!-- RIGHT: Notes Display -->
    <div class="panel-notes">
        <div class="panel-notes-header">
            <p class="panel-label">All Notes</p>
            <span class="note-count" id="note-count">0</span>
        </div>
        <div class="notes-list">
            <div id="note-card-reuse"></div>
        </div>
    </div>
</div>

</body>
</html>
