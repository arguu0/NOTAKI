<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up — Notaki</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Inter:400,500&display=swap">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/register.js"></script>
</head>
<body>

<header>
    <h1><span class="accent-dot"></span>NOTAKI</h1>
    <p class="subtitle">FastAPI · SQLModel</p>
</header>

<main class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-card-header">
            <h2>Create Account</h2>
            <p>Sign up to start saving your notes</p>
        </div>

        <!-- Reserved space for future validation/error messages -->
        <div class="form-message" id="signup-msg">
            <!-- Error or Validation Msg display here -->
        </div>

        <form id="form_id">

            <div class="field-group">
                <label class="field-label" for="signup-username">Username</label>
                <input
                    type="text"
                    id="signup-username"
                    name="username"
                    class="field-input"
                    placeholder="yourusername"
                    autocomplete="username">
            </div>

            <div class="field-group">
                <label class="field-label" for="signup-email">Email</label>
                <input
                    type="email"
                    id="signup-email"
                    name="email"
                    class="field-input"
                    placeholder="you@example.com"
                    autocomplete="email">
            </div>

            <div class="field-group">
                <label class="field-label" for="signup-password">Password</label>
                <input
                    type="password"
                    id="signup-password"
                    name="password"
                    class="field-input"
                    placeholder="••••••••"
                    autocomplete="new-password">
            </div>

            <div class="field-group">
                <label class="field-label" for="signup-confirm-password">Confirm Password</label>
                <input
                    type="password"
                    id="signup-confirm-password"
                    name="confirm_password"
                    class="field-input"
                    placeholder="••••••••"
                    autocomplete="new-password">
            </div>
            
            <button type="button" class="btn-accent" id="register-btn">Create Account</button>

        </form>

        <p class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </p>

    </div>
</main>

</body>
</html>
