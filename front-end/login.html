<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login — Notaki</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Inter:400,500&display=swap">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/login.js"></script>
    <link rel="icon" type="image/png" href="favicon/notaki_favicon.png">
</head>
<body>

<header>
    <h1><span class="accent-dot"></span>NOTAKI</h1>
    <p class="subtitle">FastAPI · SQLModel</p>
</header>

<main class="auth-wrapper">

    <div class="d-flex align-items-center gap-2" id="loading">
        <div class="spinner-border"></div>
        <span class="fs-2" style="font-family: 'Audiowide', sans-serif;">Please Wait A Moment...</span>
    </div>

    <div class="auth-card d-none" id="main">

        <div class="auth-card-header">
            <h2>Welcome Back</h2>
            <p>Log in to access your notes</p>
        </div>


        <p class="form-message" id="login-msg"></p>

        <form id="form_id">

            <div class="field-group">
                <label class="field-label" for="login-email">Email</label>
                <input
                    type="email"
                    id="login-email"
                    name="email"
                    class="field-input"
                    placeholder="you@example.com"
                    autocomplete="email">
            </div>

            <div class="field-group">
                <label class="field-label" for="login-password">Password</label>
                <input
                    type="password"
                    id="login-password"
                    name="password"
                    class="field-input"
                    placeholder="••••••••"
                    autocomplete="current-password">
            </div>

            <button type="button" id="login-btn" class="btn-accent">Login</button>

        </form>

        <p class="auth-footer">
            Don't have an account? <a href="index.html">Sign up</a>
        </p>

    </div>
</main>

</body>
</html>
