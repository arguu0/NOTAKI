<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login — Secure Notes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide|Inter:400,500&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1><span class="accent-dot"></span>Note Taking API</h1>
    <p class="subtitle">FastAPI · SQLite · REST</p>
</header>

<main class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-card-header">
            <h2>Welcome Back</h2>
            <p>Log in to access your notes</p>
        </div>

        <!-- Reserved space for future error messages -->
        <p class="form-message" id="login-error">
            Invalid username/email or password.
        </p>

        <form action="" method="POST">

            <div class="field-group">
                <label class="field-label" for="login-identifier">Username or Email</label>
                <input
                    type="text"
                    id="login-identifier"
                    name="identifier"
                    class="field-input"
                    placeholder="you@example.com"
                    autocomplete="username">
            </div>

            <div class="field-group">
                <label class="field-label" for="login-password">Password</label>
                <input
                    type="password"
                    id="login-password"
                    name="password"
                    class="field-input"
                    placeholder="••••••••"
                    autocomplete="current-password">
            </div>

            <button type="submit" class="btn-accent">Login</button>

        </form>

        <p class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </p>

    </div>
</main>

</body>
</html>
